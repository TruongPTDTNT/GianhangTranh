<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gian Hàng Tranh Đông Hồ - Khối 10 PTDTNT Lâm Đồng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Import font hỗ trợ tiếng Việt đầy đủ */
        @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,400;0,700;0,900;1,400&display=swap');

        :root {
            --color-wood-dark: #2d170b;
            --color-wood: #4a2e15;
            --color-bamboo-light: #e3bc7d;
            --color-bamboo-mid: #c29553;
            --color-bamboo-dark: #8b5a2b;
            --color-accent: #b91c1c; 
        }

        body {
            font-family: 'Be Vietnam Pro', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #120e0a;
            margin: 0;
            overflow-x: hidden;
            color: #3a2a1a;
            -webkit-tap-highlight-color: transparent;
        }

        .bamboo-mat-bg {
            background-color: #d1a86e;
            background-image: 
                repeating-linear-gradient(to bottom, transparent, transparent 4px, rgba(0,0,0,0.1) 4px, rgba(0,0,0,0.1) 6px),
                repeating-linear-gradient(to right, transparent, transparent 20px, rgba(139, 69, 19, 0.2) 20px, rgba(139, 69, 19, 0.2) 22px);
            box-shadow: inset 0 0 100px rgba(0,0,0,0.7);
        }

        .bamboo-v {
            background: linear-gradient(90deg, #5c3716 0%, #c29553 30%, #e3bc7d 50%, #c29553 70%, #3a200a 100%);
            box-shadow: 3px 0 10px rgba(0,0,0,0.5), inset -1px 0 2px rgba(0,0,0,0.4);
        }
        
        .bamboo-joint-v {
            width: 100%;
            height: 3px;
            background: rgba(45, 23, 11, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            margin-top: 60px;
        }

        .bamboo-h {
            background: linear-gradient(180deg, #3a200a 0%, #c29553 30%, #e3bc7d 50%, #c29553 70%, #1a0f05 100%);
            box-shadow: 0 5px 15px rgba(0,0,0,0.7);
        }

        .thatch-roof-container {
            position: relative;
            z-index: 50;
            width: 100%;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.9));
        }

        .thatch-layer {
            background-color: #4a3018;
            background-image: 
                repeating-linear-gradient(75deg, transparent, transparent 3px, rgba(0,0,0,0.3) 3px, rgba(0,0,0,0.3) 6px),
                repeating-linear-gradient(105deg, transparent, transparent 3px, rgba(227, 188, 125, 0.2) 3px, rgba(227, 188, 125, 0.2) 6px);
            border-bottom: 4px solid #2d170b;
        }

        .thatch-fringe {
            height: 15px;
            background-image: 
                linear-gradient(-45deg, transparent 75%, #3a2210 75%), 
                linear-gradient(45deg, transparent 75%, #3a2210 75%);
            background-size: 12px 15px;
            background-repeat: repeat-x;
            transform: translateY(-1px);
        }

        .rope {
            width: 2px;
            background: repeating-linear-gradient(45deg, #5c3a21, #5c3a21 2px, #3a200a 2px, #3a200a 4px);
            box-shadow: 1px 0 1px rgba(0,0,0,0.4);
            z-index: 1; /* Nằm dưới lớp khung tranh */
        }

        .ancient-border {
            border: 4px solid transparent;
            border-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png') 30 round;
            background: #e8dbce;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            position: relative;
            z-index: 10;
        }

        @media (min-width: 640px) {
            .ancient-border { border-width: 12px; }
            .bamboo-joint-v { margin-top: 120px; }
            .thatch-fringe { height: 20px; background-size: 15px 20px; }
            .rope { width: 3px; }
        }

        .wooden-sign {
            background: url('https://www.transparenttextures.com/patterns/wood-pattern.png'), linear-gradient(to bottom, #4a1a0a, #2a0a00);
            border: 3px solid #1a0500;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8), 0 10px 20px rgba(0,0,0,0.7);
        }

        @media (min-width: 640px) {
            .wooden-sign { border-width: 8px; }
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 100;
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
        }
        
        .modal-overlay.active {
            display: flex;
            animation: fadeIn 0.3s ease-out;
        }

        .modal-content-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            background: #fdfbf7;
            overflow-y: auto;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (min-width: 768px) {
            .modal-overlay { padding: 40px; }
            .modal-content-wrapper { 
                height: auto; 
                max-height: 85vh; 
                border: 8px solid #3a1a0f; 
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
                width: 90%;
                max-width: 1100px;
                border-radius: 4px;
            }
        }

        .drop-cap::first-letter {
            float: left;
            font-size: 3rem;
            line-height: 0.8;
            margin: 0.1em 0.15em 0 0;
            color: var(--color-accent);
            font-weight: 900;
        }

        /* Xử lý dây thừng không bị đè lên tranh khác */
        .painting-item-container {
            overflow: visible;
            position: relative;
        }
    </style>
</head>
<body>

    <header class="thatch-roof-container">
        <div class="w-full h-12 sm:h-32 thatch-layer relative overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-b from-black/40 to-transparent"></div>
        </div>
        <div class="w-full thatch-fringe"></div>
    </header>

    <main class="w-full max-w-7xl mx-auto relative min-h-screen">
        <div class="absolute inset-0 bamboo-mat-bg z-0 border-x-[6px] sm:border-x-[16px] border-[#1a0f05]"></div>

        <aside class="absolute left-0 top-0 bottom-0 w-3 sm:w-16 bamboo-v z-20 overflow-hidden">
            <script>for(let i=0; i<40; i++) document.write('<div class="bamboo-joint-v"></div>');</script>
        </aside>
        <aside class="absolute right-0 top-0 bottom-0 w-3 sm:w-16 bamboo-v z-20 overflow-hidden">
            <script>for(let i=0; i<40; i++) document.write('<div class="bamboo-joint-v"></div>');</script>
        </aside>

        <div class="absolute top-0 left-0 right-0 h-6 sm:h-12 bamboo-h z-30 flex items-center overflow-hidden">
             <script>for(let i=0; i<30; i++) document.write('<div class="h-full w-[2px] bg-black/20 mx-8 sm:mx-20"></div>');</script>
        </div>

        <section class="relative z-10 px-4 sm:px-24 pt-10 sm:pt-24 pb-16 flex flex-col items-center">
            
            <div class="relative mb-8 sm:mb-20 flex flex-col items-center w-full max-w-lg">
                <div class="absolute -top-10 sm:-top-24 left-[15%] h-10 sm:h-24 rope rotate-[-5deg] origin-top"></div>
                <div class="absolute -top-10 sm:-top-24 right-[15%] h-10 sm:h-24 rope rotate-[5deg] origin-top"></div>
                
                <div class="wooden-sign px-3 py-3 sm:px-12 sm:py-6 rounded-sm text-center w-full z-10 transform -rotate-1 relative">
                    <h1 class="text-base sm:text-5xl font-black uppercase tracking-wider text-[#facc15] leading-tight m-0" style="text-shadow: 2px 2px 0 #000;">
                        Di Sản Tranh <br> Đông Hồ
                    </h1>
                </div>
            </div>

            <div id="painting-grid" class="grid grid-cols-3 gap-y-12 sm:gap-y-24 gap-x-3 sm:gap-x-12 w-full max-w-6xl mt-4">
                <!-- Grid items generated by JS -->
            </div>

            <footer class="mt-20 p-4 sm:p-8 bg-[#e8dbce] border-2 sm:border-8 border-double border-[#4a2e15] rounded-sm text-center w-full max-w-2xl shadow-xl relative z-10">
                <h4 class="text-red-900 font-bold text-[10px] sm:text-lg mb-1 tracking-widest uppercase">Nhóm thực hiện:</h4>
                <p class="text-[#2d170b] font-black text-xs sm:text-3xl uppercase tracking-tighter leading-tight">
                    Khối 10 Trường PTDTNT <br class="sm:hidden"> Tỉnh Lâm Đồng
                </p>
            </footer>
        </section>
    </main>

    <!-- Modal -->
    <div id="modal" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content-wrapper" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-4 right-4 z-[110] bg-red-700 text-white w-10 h-10 rounded-full flex items-center justify-center font-bold border-2 border-white shadow-lg">✕</button>
            <div class="flex flex-col md:flex-row min-h-full">
                <div class="w-full md:w-3/5 bg-[#c8a165] p-4 sm:p-12 flex items-center justify-center border-b-[6px] md:border-b-0 md:border-r-[12px] border-[#3a1a0f] relative min-h-[45vh] md:min-h-0">
                    <div class="relative p-2 sm:p-6 bg-[#f4ebd8] border-4 sm:border-[12px] border-[#2a1a0f] shadow-2xl">
                        <img id="modal-img" src="" alt="" class="max-w-full max-h-[40vh] sm:max-h-[65vh] object-contain mix-blend-multiply">
                    </div>
                </div>
                <div class="w-full md:w-2/5 p-6 sm:p-12 flex flex-col justify-center bg-[#fdfbf7]">
                    <div id="modal-cat-box" class="mb-3">
                        <span id="modal-cat" class="text-red-800 font-black text-xs sm:text-sm uppercase tracking-[0.2em] flex items-center gap-2"></span>
                    </div>
                    <h2 id="modal-title" class="text-2xl sm:text-5xl font-black text-[#1a0f05] mb-4 sm:mb-8 border-b-2 sm:border-b-[6px] border-red-900/10 pb-2 sm:pb-6 uppercase leading-tight"></h2>
                    <div class="text-sm sm:text-xl text-[#4a2e15] leading-relaxed mb-8">
                        <p id="modal-meaning" class="drop-cap font-medium italic sm:not-italic"></p>
                    </div>
                    <button onclick="closeModal()" class="md:hidden w-full py-4 bg-[#3a1a0f] text-[#facc15] font-bold uppercase text-sm tracking-widest rounded-sm shadow-lg">Đóng xem tranh</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Dữ liệu tranh với nội dung Tiếng Việt đầy đủ dấu
        const paintings = [
            { id: 1, title: 'Lợn Âm Dương', image: 'https://upload.wikimedia.org/wikipedia/vi/7/7c/Tranh_L%E1%BB%A3n.PNG', cat: 'Tranh chúc tụng', meaning: 'Hình ảnh con lợn với xoáy âm dương tượng trưng cho quy luật sinh hóa, sự sinh sôi nảy nở. Đây là lời chúc cho gia đình luôn no đủ, thịnh vượng và cuộc sống hòa hợp.' },
            { id: 2, title: 'Lợn Đàn', image: 'https://hoanghamobile.com/tin-tuc/wp-content/uploads/2023/08/tranh-dong-ho-2.jpg', cat: 'Tranh chúc tụng', meaning: 'Lợn mẹ quây quần bên đàn con béo tốt thể hiện khát vọng về một gia đình đông đúc, ấm no, sung túc và sự phát triển bền vững của dòng họ.' },
            { id: 3, title: 'Gà Trống', image: 'https://imgs.vietnamnet.vn/Images/2017/01/20/19/20170120193230-a9.jpg?width=260&s=Ft22g6kPKQ04ulmFL3THDw', cat: 'Tranh chúc tụng', meaning: 'Gà trống là biểu tượng của Ngũ đức: Văn, Võ, Dũng, Nhân, Tín. Tranh mang ý nghĩa cầu chúc đại cát, mang lại ánh sáng xua tan bóng tối và điềm xấu.' },
            { id: 4, title: 'Gà Mẹ Con', image: 'https://upload.wikimedia.org/wikipedia/commons/8/84/S%C3%A2n_g%C3%A0.JPG', cat: 'Tranh chúc tụng', meaning: 'Tôn vinh tình mẫu tử thiêng liêng. Hình ảnh đàn gà quây quần là lời chúc cho con cháu đầy đàn, gia đình luôn hạnh phúc và bảo bọc lẫn nhau.' },
            { id: 5, title: 'Vinh Hoa', image: 'https://upload.wikimedia.org/wikipedia/commons/0/0d/Vinh_hoa.JPG', cat: 'Tranh chúc tụng', meaning: 'Em bé ôm gà trống (Vinh Hoa) mang ý nghĩa cầu chúc sinh được con trai khôi ngô, thông minh, sau này lớn lên vinh hiển và có địa vị trong xã hội.' },
            { id: 6, title: 'Cá Chép', image: 'https://upload.wikimedia.org/wikipedia/commons/6/68/Tranh_%C4%90%C3%B4ng_H%E1%BB%93_-_C%C3%A1_ch%C3%A9p.jpg', cat: 'Tranh chúc tụng', meaning: 'Lý Ngư Vọng Nguyệt (Cá chép trông trăng) thể hiện ước nguyện về sự sung túc, tâm hồn thanh cao và ý chí kiên trì vượt vũ môn để thành công.' },
            { id: 7, title: 'Cá Chậu', image: 'https://bizweb.dktcdn.net/100/438/304/files/tranh-giay-dong-ho-ca-chau-26x37cm.jpg?v=1682573537959', cat: 'Tranh chúc tụng', meaning: 'Hình ảnh cá trong chậu nhắc nhở về sự nhẫn nại, quý trọng những giá trị cốt lõi và niềm vui giản dị trong cuộc sống thường nhật.' },
            { id: 8, title: 'Đám Cưới Chuột', image: 'https://media-cdn-v2.laodong.vn/storage/newsportal/2020/1/20/779763/Dam-Cuoi-Chuot.jpg?w=660', cat: 'Tranh trào phúng', meaning: 'Bức tranh trào phúng nổi tiếng phê phán chế độ phong kiến qua hình ảnh chuột cống nạp cho mèo. Thể hiện sự khôn khéo và trí tuệ dân gian trong việc đấu tranh.' },
            { id: 9, title: 'Đánh Ghen', image: 'https://upload.wikimedia.org/wikipedia/commons/f/fc/%C4%90%C3%A1nh_ghen.JPG', cat: 'Tranh sinh hoạt', meaning: 'Phản ánh mâu thuẫn gia đình trong xã hội đa thê cũ. Tranh mang tính răn đe, giáo dục đạo đức lối sống một cách hài hước và sâu cay.' },
            { id: 10, title: 'Hứng Dừa', image: 'https://upload.wikimedia.org/wikipedia/commons/6/68/H%C3%A1i_d%E1%BB%ABa.JPG', cat: 'Tranh sinh hoạt', meaning: 'Khắc họa cảnh lao động tươi vui, hạnh phúc của một gia đình. Ca ngợi sự gắn kết, đồng lòng của các thành viên trong cuộc sống.' },
            { id: 11, title: 'Bịt Mắt Bắt Dê', image: 'https://dbnd.quangngai.gov.vn/items/cms/1047.jpg', cat: 'Tranh sinh hoạt', meaning: 'Tái hiện trò chơi dân gian rộn rã tiếng cười, thể hiện tinh thần lạc quan, yêu đời và sức sống mãnh liệt của người dân Việt Nam.' },
            { id: 12, title: 'Trâu Sen', image: 'https://phapluat.tuoitrethudo.vn/stores/news_dataimages/phamhongmanh/022021/06/22/3938_Tranh_Dong_Ho.jpg?rt=20210206224211', cat: 'Tranh sinh hoạt', meaning: 'Hình ảnh chú bé thổi sáo trên lưng trâu giữa đầm sen là biểu tượng của sự thái bình, thịnh trị và tâm hồn yêu thiên nhiên tha thiết.' },
            { id: 13, title: 'Bà Triệu', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhv9-dIBrolX-AcBmEv8Tm9iULxZ2BK6ftqCWXs4aC-R5DutN5hIg0Ifz36p6nMeByhyMkjk7DIsmAEIVSBzc4Pq-3FSJCldbI1t1swNFF_PrUmYCPNfmD32hfq5W_Q-_7mVMrt7IepKoRf/s1600/1.jpg', cat: 'Tranh lịch sử', meaning: 'Tôn vinh khí phách anh hùng của Nữ vương Triệu Thị Trinh. Bức tranh khẳng định truyền thống yêu nước và sức mạnh kiên cường của người phụ nữ Việt.' },
            { id: 14, title: 'Vinh Quy Bái Tổ', image: 'https://tranhdangiandongho.vn/upload/files/2(1).jpg', cat: 'Tranh lịch sử', meaning: 'Ca ngợi đạo lý "Uống nước nhớ nguồn" và tinh thần hiếu học. Hình ảnh tân khoa đỗ đạt về làng tri ân tổ tiên là bài học giáo dục quý giá.' }
        ];

        const grid = document.getElementById('painting-grid');

        paintings.forEach((p) => {
            const container = document.createElement('div');
            container.className = "painting-item-container flex flex-col items-center";
            
            const randomRotation = (Math.random() - 0.5) * 3;

            container.innerHTML = `
                <div class="relative w-full transform transition-all duration-300 active:scale-95 cursor-pointer">
                    <!-- Sợi dây được đặt cao hơn để không bị đè lên tranh khác khi thu nhỏ trên điện thoại -->
                    <div class="absolute -top-[45px] sm:-top-[95px] left-[20%] w-[2px] sm:w-[3px] h-[50px] sm:h-[100px] rope origin-bottom"></div>
                    <div class="absolute -top-[45px] sm:-top-[95px] right-[20%] w-[2px] sm:w-[3px] h-[50px] sm:h-[100px] rope origin-bottom"></div>

                    <div onclick="openModal(${p.id})" class="ancient-border p-1.5 sm:p-5 w-full" style="transform: rotate(${randomRotation}deg);">
                        <!-- Đinh treo giả -->
                        <div class="absolute top-[4px] left-[20%] w-1 sm:w-2.5 h-1 sm:h-2.5 bg-black/80 rounded-full z-20 shadow-sm"></div>
                        <div class="absolute top-[4px] right-[20%] w-1 sm:w-2.5 h-1 sm:h-2.5 bg-black/80 rounded-full z-20 shadow-sm"></div>
                        
                        <div class="relative w-full aspect-[4/3] overflow-hidden bg-[#f4ebd8] flex items-center justify-center border border-black/5">
                            <img src="${p.image}" alt="${p.title}" class="object-contain w-full h-full mix-blend-multiply transition-opacity duration-500 opacity-0" onload="this.style.opacity='1'">
                        </div>
                        
                        <div class="mt-1.5 sm:mt-4 border-t border-amber-950/20 pt-1 text-center">
                            <h3 class="text-[8px] sm:text-xl font-black text-[#1a0f05] uppercase truncate leading-tight">${p.title}</h3>
                        </div>
                    </div>
                </div>
            `;
            grid.appendChild(container);
        });

        function openModal(id) {
            const p = paintings.find(item => item.id === id);
            if (!p) return;

            document.getElementById('modal-img').src = p.image;
            document.getElementById('modal-title').innerText = p.title;
            document.getElementById('modal-cat').innerHTML = `<span class="w-5 h-[3px] bg-red-800"></span> ${p.cat}`;
            document.getElementById('modal-meaning').innerText = p.meaning;
            
            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
